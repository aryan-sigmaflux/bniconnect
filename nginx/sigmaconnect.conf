# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name connectapi.sigmaflux.com;

    # Certbot ACME challenge (needed for SSL cert issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ──
server {
    listen 443 ssl http2;
    server_name connectapi.sigmaflux.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/connect.sigmaflux.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/connect.sigmaflux.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

    # ── Frontend has been moved to Vercel ──

    # ── Backend API (FastAPI on port 8000 internal / 8010 host) ──
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # File upload limits
        client_max_body_size 10M;
    }

    # ── Static uploaded files (profile images, etc.) ──
    location /uploads/ {
        alias /var/www/sigmaconnect/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
}
